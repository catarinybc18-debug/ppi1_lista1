<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <html>
<head>
    <title>Formulário de Contato</title>
</head>

<body>

<!-- Link para voltar -->
<a href="4_curriculo.html">⬅ Voltar para o currículo</a>

<hr>

<!-- Instruções -->
<p>
    <strong>Preencha o formulário abaixo:</strong> Todos os campos obrigatórios devem ser preenchidos corretamente antes do envio.
</p>

<hr>

<form>

    <!-- Nome -->
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
    <br><br>

    <!-- Email -->
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
    <br><br>

    <!-- Assunto -->
    <label for="assunto">Assunto:</label><br>
    <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto">
    <br><br>

    <!-- Estado -->
    <label for="estado">Estado:</label><br>
    <select id="estado" name="estado" required>
        <option value="">Selecione seu estado</option>
        <option>PR</option>
        <option>SC</option>
        <option>RS</option>
        <option>SP</option>
        <option>RJ</option>
        <option>MG</option>
    </select>
    <br><br>

    <!-- Mensagem -->
    <label for="mensagem">Mensagem:</label><br>
    <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>
    <br><br>

    <!-- Botão -->
    <button type="submit">Enviar</button>

</form>

</body>
</html>
</body>
</html>
